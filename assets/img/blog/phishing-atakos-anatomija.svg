<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" role="img" aria-labelledby="img-title img-desc">
  <title id="img-title">Phishing atakos anatomija — 5 etapai nuo email iki duomenų pažeidimo</title>
  <desc id="img-desc">Schema vaizduoja 5 phishing atakos etapus: pasiruošimas (OSINT, tikslo identifikavimas), siuntimas (spoofed email), spustelėjimas (darbuotojas atidaro nuorodą per 60 sek.), prisijungimas (suvedami kredencialai į suklastotą puslapį), išnaudojimas (lateral movement, ransomware, duomenų išvedimas).</desc>

  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f7f4"/>
      <stop offset="100%" stop-color="#eae8e2"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="360" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="40" y="40" fill="#07111f" font-family="system-ui, sans-serif" font-size="18" font-weight="800">Phishing atakos anatomija — 5 etapai</text>
  <text x="40" y="60" fill="#5a564c" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Verizon DBIR 2024 + MITRE ATT&amp;CK Initial Access (T1566)</text>

  <!-- Steps connector line -->
  <line x1="120" y1="180" x2="980" y2="180" stroke="rgba(7,17,31,0.15)" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Step 1 -->
  <g transform="translate(40,90)">
    <circle cx="80" cy="90" r="32" fill="#07111f"/>
    <text x="80" y="96" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">1</text>
    <text x="80" y="146" text-anchor="middle" fill="#07111f" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Pasiruošimas</text>
    <text x="80" y="172" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">OSINT žvalgyba</text>
    <text x="80" y="186" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">LinkedIn, įmonės</text>
    <text x="80" y="200" text-anchor="middle" fill="#5a564c" font-family="système-ui, sans-serif" font-size="11">svetainė, oraganograma</text>
    <text x="80" y="226" text-anchor="middle" fill="#2255e0" font-family="system-ui, sans-serif" font-size="11" font-weight="700">~3-7 dienos</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(220,90)">
    <circle cx="80" cy="90" r="32" fill="#07111f"/>
    <text x="80" y="96" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">2</text>
    <text x="80" y="146" text-anchor="middle" fill="#07111f" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Siuntimas</text>
    <text x="80" y="172" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">Spoofed email</text>
    <text x="80" y="186" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">SPF/DKIM trūkumai</text>
    <text x="80" y="200" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">įmonės pavadinimas</text>
    <text x="80" y="226" text-anchor="middle" fill="#2255e0" font-family="system-ui, sans-serif" font-size="11" font-weight="700">~30 sek.</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(400,90)">
    <circle cx="80" cy="90" r="32" fill="#dc2626"/>
    <text x="80" y="96" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">3</text>
    <text x="80" y="146" text-anchor="middle" fill="#dc2626" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Spustelėjimas</text>
    <text x="80" y="172" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">Darbuotojas atidaro</text>
    <text x="80" y="186" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">nuorodą — 34% CTR</text>
    <text x="80" y="200" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">be mokymų</text>
    <text x="80" y="226" text-anchor="middle" fill="#dc2626" font-family="system-ui, sans-serif" font-size="11" font-weight="700">~60 sek.</text>
  </g>

  <!-- Step 4 -->
  <g transform="translate(580,90)">
    <circle cx="80" cy="90" r="32" fill="#dc2626"/>
    <text x="80" y="96" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">4</text>
    <text x="80" y="146" text-anchor="middle" fill="#dc2626" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Prisijungimas</text>
    <text x="80" y="172" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">Įveda kredencialus</text>
    <text x="80" y="186" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">į suklastotą puslapį</text>
    <text x="80" y="200" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">be MFA — visa</text>
    <text x="80" y="226" text-anchor="middle" fill="#dc2626" font-family="system-ui, sans-serif" font-size="11" font-weight="700">~5 min.</text>
  </g>

  <!-- Step 5 -->
  <g transform="translate(760,90)">
    <circle cx="80" cy="90" r="32" fill="#7d5b14"/>
    <text x="80" y="96" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">5</text>
    <text x="80" y="146" text-anchor="middle" fill="#7d5b14" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Išnaudojimas</text>
    <text x="80" y="172" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">Lateral movement</text>
    <text x="80" y="186" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">ransomware, duomenų</text>
    <text x="80" y="200" text-anchor="middle" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">išvedimas</text>
    <text x="80" y="226" text-anchor="middle" fill="#7d5b14" font-family="system-ui, sans-serif" font-size="11" font-weight="700">~60 min. - 30 d.</text>
  </g>

  <!-- Bottom indicator -->
  <g transform="translate(40,290)">
    <text x="0" y="0" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2">SUSTABDYMO TAŠKAS:</text>
    <text x="170" y="0" fill="#dc2626" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Etapas 3 — darbuotojas atpažįsta phishing.</text>
    <text x="0" y="20" fill="#5a564c" font-family="system-ui, sans-serif" font-size="11">Mokymai + simuliacijos sumažina sėkmingumą nuo 34% iki 4-5% per 6-12 mėnesių.</text>
  </g>
</svg>
