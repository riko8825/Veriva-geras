<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="BDAR duomenų subjekto teisės — 6 teisės">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0c1a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#1a47cc" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#1a47cc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.82" cy="0.78" r="0.5">
      <stop offset="0" stop-color="#c8962a" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#c8962a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="av" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2255e0"/>
      <stop offset="1" stop-color="#c8962a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Eyebrow -->
  <text x="80" y="108" font-family="'Hanken Grotesk',system-ui,sans-serif" font-size="22" font-weight="800" letter-spacing="4" fill="#e8b84b">BDAR · III SKYRIUS</text>

  <!-- Title -->
  <text x="80" y="186" font-family="'Hanken Grotesk',system-ui,sans-serif" font-size="62" font-weight="800" letter-spacing="-1" fill="#ffffff">Duomenų subjekto</text>
  <text x="80" y="256" font-family="'Hanken Grotesk',system-ui,sans-serif" font-size="62" font-weight="800" letter-spacing="-1" fill="#ffffff">teisės</text>

  <!-- Subtitle -->
  <text x="82" y="306" font-family="'Hanken Grotesk',system-ui,sans-serif" font-size="25" font-weight="400" fill="rgba(255,255,255,0.62)">6 teisės · atsakymas per 1 mėnesį</text>

  <!-- Central avatar (person) -->
  <g transform="translate(600,470)">
    <circle cx="0" cy="0" r="62" fill="url(#av)" opacity="0.95"/>
    <circle cx="0" cy="-16" r="20" fill="#07111f" opacity="0.9"/>
    <path d="M -32 36 Q 0 -4 32 36 Z" fill="#07111f" opacity="0.9"/>
  </g>

  <!-- 6 rights as orbiting chips -->
  <g font-family="'Hanken Grotesk',system-ui,sans-serif" font-size="19" font-weight="700">
    <!-- top-left -->
    <g transform="translate(206,432)">
      <rect x="0" y="0" width="196" height="52" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
      <circle cx="34" cy="26" r="8" fill="#2255e0"/>
      <text x="58" y="33" fill="#ffffff">Susipažinti</text>
    </g>
    <!-- top-right -->
    <g transform="translate(798,432)">
      <rect x="0" y="0" width="196" height="52" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
      <circle cx="34" cy="26" r="8" fill="#00b4d8"/>
      <text x="58" y="33" fill="#ffffff">Ištaisyti</text>
    </g>
    <!-- mid-left -->
    <g transform="translate(150,516)">
      <rect x="0" y="0" width="220" height="52" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
      <circle cx="34" cy="26" r="8" fill="#dc2626"/>
      <text x="58" y="33" fill="#ffffff">Būti pamirštam</text>
    </g>
    <!-- mid-right -->
    <g transform="translate(830,516)">
      <rect x="0" y="0" width="196" height="52" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
      <circle cx="34" cy="26" r="8" fill="#e8b84b"/>
      <text x="58" y="33" fill="#ffffff">Apriboti</text>
    </g>
    <!-- bottom-left -->
    <g transform="translate(250,576)">
      <rect x="0" y="0" width="200" height="46" rx="23" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
      <circle cx="32" cy="23" r="7" fill="#2255e0"/>
      <text x="54" y="29" font-size="17" fill="rgba(255,255,255,0.9)">Perkelti</text>
    </g>
    <!-- bottom-right -->
    <g transform="translate(752,576)">
      <rect x="0" y="0" width="200" height="46" rx="23" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
      <circle cx="32" cy="23" r="7" fill="#00b4d8"/>
      <text x="54" y="29" font-size="17" fill="rgba(255,255,255,0.9)">Nesutikti</text>
    </g>
  </g>

  <!-- Brand -->
  <g transform="translate(80,560)">
    <path d="M 0 4 L 16 4 L 24 38 L 24 44 L 18 44 Z" fill="#ffffff"/>
    <path d="M 24 38 L 32 4 L 48 4 L 30 44 L 24 44 Z" fill="rgba(255,255,255,0.5)"/>
    <text x="60" y="34" font-family="'Hanken Grotesk',system-ui,sans-serif" font-size="26" font-weight="800" letter-spacing="2" fill="#ffffff">VERIVA</text>
  </g>
</svg>
