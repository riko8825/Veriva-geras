<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" role="img" aria-labelledby="plan-title plan-desc">
  <title id="plan-title">5 žingsnių planas, kaip išvengti BDAR baudos 2026 metais</title>
  <desc id="plan-desc">Schema vaizduoja Veriva 5 žingsnių BDAR atitikties planą Lietuvos įmonėms: BDAR atitikties auditas, dokumentacija ir politikos, darbuotojų mokymai, incidentų valdymo procedūra, DPO arba išorinis konsultantas.</desc>

  <defs>
    <linearGradient id="circ" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a47cc"/>
      <stop offset="100%" stop-color="#2255e0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(34,85,224,0.2)"/>
      <stop offset="100%" stop-color="rgba(34,85,224,0.5)"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="480" fill="#07111f"/>

  <!-- Subtle radial -->
  <radialGradient id="rad" cx="0.5" cy="0.4" r="0.7">
    <stop offset="0%" stop-color="rgba(34,85,224,0.18)"/>
    <stop offset="100%" stop-color="rgba(34,85,224,0)"/>
  </radialGradient>
  <rect width="1100" height="480" fill="url(#rad)"/>

  <!-- Title -->
  <text x="550" y="64" text-anchor="middle" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="12" font-weight="800" letter-spacing="3">VERIVA · BDAR ATITIKTIES PLANAS</text>
  <text x="550" y="100" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5">5 žingsniai, kaip išvengti BDAR baudos</text>
  <text x="550" y="126" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Veriva metodika · 120+ klientų · €0 VDAI baudų nuo 2017 m.</text>

  <!-- Vertical timeline -->
  <line x1="120" y1="200" x2="980" y2="200" stroke="url(#line)" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Step circles row -->
  <g>
    <!-- Step 1 -->
    <g transform="translate(120,200)">
      <circle r="36" fill="#0c1a2e" stroke="url(#circ)" stroke-width="3"/>
      <text y="8" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">01</text>
      <text y="76" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Atitikties</text>
      <text y="94" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">auditas</text>
      <text y="120" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="11.5">Spragų</text>
      <text y="135" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="11.5">nustatymas</text>
      <text y="160" text-anchor="middle" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="11" font-weight="700">5–7 dienos</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(335,200)">
      <circle r="36" fill="#0c1a2e" stroke="url(#circ)" stroke-width="3"/>
      <text y="8" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">02</text>
      <text y="76" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Dokumentacija</text>
      <text y="94" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">ir politikos</text>
      <text y="120" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="11.5">Privatumo politika,</text>
      <text y="135" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="11.5">DPA, registras</text>
      <text y="160" text-anchor="middle" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="11" font-weight="700">2–4 savaitės</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(550,200)">
      <circle r="36" fill="#0c1a2e" stroke="url(#circ)" stroke-width="3"/>
      <text y="8" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">03</text>
      <text y="76" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Darbuotojų</text>
      <text y="94" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">mokymai</text>
      <text y="120" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="11.5">Phishing,</text>
      <text y="135" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="11.5">incidentų reagavimas</text>
      <text y="160" text-anchor="middle" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="11" font-weight="700">1× per metus</text>
    </g>

    <!-- Step 4 -->
    <g transform="translate(765,200)">
      <circle r="36" fill="#0c1a2e" stroke="url(#circ)" stroke-width="3"/>
      <text y="8" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">04</text>
      <text y="76" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Incidentų</text>
      <text y="94" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">valdymas</text>
      <text y="120" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="11.5">VDAI pranešimas</text>
      <text y="135" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="11.5">per 72 val.</text>
      <text y="160" text-anchor="middle" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Procedūra</text>
    </g>

    <!-- Step 5 -->
    <g transform="translate(980,200)">
      <circle r="36" fill="#0c1a2e" stroke="#e8b84b" stroke-width="3"/>
      <text y="8" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">05</text>
      <text y="76" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">DPO arba</text>
      <text y="94" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">konsultantas</text>
      <text y="120" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="11.5">Tęstinė</text>
      <text y="135" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="11.5">priežiūra</text>
      <text y="160" text-anchor="middle" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Outsourcing</text>
    </g>
  </g>

  <!-- Bottom highlight bar -->
  <g transform="translate(150,420)">
    <rect x="0" y="0" width="800" height="44" rx="8" fill="rgba(200,150,42,0.08)" stroke="rgba(200,150,42,0.3)" stroke-width="1"/>
    <text x="400" y="29" text-anchor="middle" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Pilna BDAR atitiktis · audito turėjimas mažina baudą 30–60% pagal BDAR 83(2) str.</text>
  </g>
</svg>
