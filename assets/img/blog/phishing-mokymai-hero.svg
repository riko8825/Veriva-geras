<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Phishing atakos ir darbuotojų mokymai 2026 — kaip 90% pažeidimų prasideda nuo žmogaus klaidos</title>
  <desc id="hero-desc">Iliustracija vaizduoja phishing email su raudonu įspėjimu, klikų statistiką (34% darbuotojų be mokymų atidaro phishing nuorodą, 4% po reguliarių simuliacijų) ir Veriva mokymų sumažinimo efektą.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.75" r="0.5">
      <stop offset="0%" stop-color="#c8962a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c8962a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emailGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#07111f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Phishing email mockup left side -->
  <g transform="translate(110,140)">
    <rect x="0" y="0" width="380" height="430" rx="10" fill="url(#emailGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

    <!-- Email header -->
    <rect x="0" y="0" width="380" height="56" rx="10" fill="#0c1a2e"/>
    <rect x="0" y="44" width="380" height="12" fill="#0c1a2e"/>
    <circle cx="22" cy="28" r="5" fill="#dc2626"/>
    <circle cx="40" cy="28" r="5" fill="#e8b84b"/>
    <circle cx="58" cy="28" r="5" fill="#10b981"/>
    <text x="190" y="33" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Inbox · Skubu</text>

    <!-- From / Subject -->
    <g transform="translate(20,80)">
      <text x="0" y="0" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="600">FROM:</text>
      <text x="50" y="0" fill="#fff" font-family="system-ui, sans-serif" font-size="11">it-support@swedbank-lt.com</text>

      <text x="0" y="22" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="600">SUBJECT:</text>
      <text x="62" y="22" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">⚠ Sąskaita užblokuota — patvirtinkite</text>
    </g>

    <!-- Red warning band -->
    <g transform="translate(20,120)">
      <rect x="0" y="0" width="340" height="44" rx="6" fill="rgba(220,38,38,0.15)" stroke="rgba(220,38,38,0.5)" stroke-width="1.5"/>
      <text x="16" y="20" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11" font-weight="700">⚠ NEPATIKIMAS SIUNTĖJAS</text>
      <text x="16" y="35" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="10">Domain neatitinka swedbank.lt</text>
    </g>

    <!-- Email body -->
    <g fill="rgba(255,255,255,0.6)">
      <text x="20" y="190" font-family="system-ui, sans-serif" font-size="11">Sveiki,</text>
      <text x="20" y="212" font-family="system-ui, sans-serif" font-size="11">Aptiktas neįprastas prisijungimas.</text>
      <text x="20" y="228" font-family="system-ui, sans-serif" font-size="11">Norėdami atblokuoti sąskaitą,</text>
      <text x="20" y="244" font-family="system-ui, sans-serif" font-size="11">spauskite žemiau esantį mygtuką</text>
      <text x="20" y="260" font-family="system-ui, sans-serif" font-size="11">per 24 valandas.</text>
    </g>

    <!-- Phishing button (red) -->
    <g transform="translate(80,290)">
      <rect x="0" y="0" width="220" height="40" rx="6" fill="#dc2626"/>
      <text x="110" y="25" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">PATVIRTINTI SĄSKAITĄ →</text>
    </g>

    <!-- URL -->
    <text x="190" y="350" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="9">URL: bit.ly/swdbnk-lt-secure-24h</text>

    <!-- Hook indicator -->
    <g transform="translate(280,160)">
      <circle cx="40" cy="40" r="36" fill="rgba(220,38,38,0.15)" stroke="#dc2626" stroke-width="2.5"/>
      <text x="40" y="36" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="9" font-weight="700">PHISHING</text>
      <text x="40" y="50" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="800">34%</text>
      <text x="40" y="62" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="system-ui, sans-serif" font-size="8">CTR</text>
    </g>
  </g>

  <!-- Right side: stats -->
  <g transform="translate(620,120)">
    <text x="0" y="0" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="3">PHISHING · STATISTIKA</text>
    <text x="0" y="50" fill="#fff" font-family="system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="-1">90% pažeidimų —</text>
    <text x="0" y="86" fill="#fff" font-family="system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="-1">žmogaus klaida</text>
    <text x="0" y="118" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="14">Verizon DBIR 2024 + IBM Cost of Data Breach 2024</text>

    <!-- Without training -->
    <g transform="translate(0,160)">
      <rect x="0" y="0" width="430" height="74" rx="8" fill="rgba(220,38,38,0.12)" stroke="rgba(220,38,38,0.5)" stroke-width="1.5"/>
      <text x="22" y="28" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2">BE MOKYMŲ</text>
      <text x="22" y="58" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">34% atidaro phishing nuorodą</text>
    </g>

    <!-- With training -->
    <g transform="translate(0,254)">
      <rect x="0" y="0" width="430" height="74" rx="8" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.5)" stroke-width="1.5"/>
      <text x="22" y="28" fill="#86efac" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2">SU REGULIARIAIS MOKYMAIS</text>
      <text x="22" y="58" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">4-5% atidaro (KnowBe4)</text>
    </g>

    <!-- Stat -->
    <g transform="translate(0,360)">
      <text x="0" y="0" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Vidutinė data breach kaina LT:</text>
      <text x="0" y="30" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="32" font-weight="800">€4,88 mln. · IBM 2024</text>
    </g>
  </g>

  <g transform="translate(110,580)">
    <text x="0" y="0" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="3">VERIVA · BDAR ATITIKTIS · KIBERNETINIS SAUGUMAS</text>
  </g>
</svg>
