<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Darbuotojų BDAR mokymai — ką privalo žinoti kiekvienas darbuotojas</title>
  <desc id="hero-desc">Iliustracija vaizduoja darbuotojų BDAR mokymų pamatą: 6 duomenų tvarkymo principai, duomenų subjektų teisės, pažeidimo atpažinimas ir slaptumo pareiga, grindžiami BDAR 39 straipsniu ir atskaitomybės principu.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.25" cy="0.28" r="0.6">
      <stop offset="0%" stop-color="#2255e0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2255e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.82" cy="0.74" r="0.55">
      <stop offset="0%" stop-color="#c8962a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c8962a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a47cc"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid pattern (subtle) -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Training board / certificate-shield left -->
  <g transform="translate(110,130)">
    <rect x="0" y="0" width="400" height="370" rx="12" fill="url(#boardGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <rect x="0" y="0" width="400" height="52" rx="12" fill="#0c1a2e"/>
    <rect x="0" y="40" width="400" height="12" fill="#0c1a2e"/>
    <text x="22" y="33" fill="rgba(255,255,255,0.85)" font-family="Syne, system-ui, sans-serif" font-size="12" font-weight="800" letter-spacing="2">BDAR MOKYMAI · PROGRAMA</text>

    <!-- Checklist rows -->
    <g font-family="system-ui, sans-serif">
      <g transform="translate(28,86)">
        <circle cx="11" cy="11" r="11" fill="rgba(34,85,224,0.25)" stroke="#93c5fd" stroke-width="1.5"/>
        <path d="M 6 11 L 9.5 14.5 L 16 7.5" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="34" y="16" fill="#fff" font-size="15" font-weight="600">Kas yra asmens duomenys (4 str.)</text>
      </g>
      <g transform="translate(28,128)">
        <circle cx="11" cy="11" r="11" fill="rgba(34,85,224,0.25)" stroke="#93c5fd" stroke-width="1.5"/>
        <path d="M 6 11 L 9.5 14.5 L 16 7.5" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="34" y="16" fill="#fff" font-size="15" font-weight="600">6 tvarkymo principai (5 str.)</text>
      </g>
      <g transform="translate(28,170)">
        <circle cx="11" cy="11" r="11" fill="rgba(34,85,224,0.25)" stroke="#93c5fd" stroke-width="1.5"/>
        <path d="M 6 11 L 9.5 14.5 L 16 7.5" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="34" y="16" fill="#fff" font-size="15" font-weight="600">Subjektų teisės (15–22 str.)</text>
      </g>
      <g transform="translate(28,212)">
        <circle cx="11" cy="11" r="11" fill="rgba(34,85,224,0.25)" stroke="#93c5fd" stroke-width="1.5"/>
        <path d="M 6 11 L 9.5 14.5 L 16 7.5" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="34" y="16" fill="#fff" font-size="15" font-weight="600">Pažeidimo atpažinimas</text>
      </g>
      <g transform="translate(28,254)">
        <circle cx="11" cy="11" r="11" fill="rgba(34,85,224,0.25)" stroke="#93c5fd" stroke-width="1.5"/>
        <path d="M 6 11 L 9.5 14.5 L 16 7.5" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="34" y="16" fill="#fff" font-size="15" font-weight="600">Slaptumo pareiga</text>
      </g>
    </g>

    <!-- Accountability stamp -->
    <rect x="28" y="300" width="344" height="48" rx="6" fill="rgba(200,150,42,0.14)" stroke="rgba(200,150,42,0.45)" stroke-width="1.5"/>
    <text x="48" y="320" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="2">DOKUMENTUOTA · 5 STR. 2 D.</text>
    <text x="48" y="339" fill="#fff" font-family="Syne, system-ui, sans-serif" font-size="15" font-weight="800">Atskaitomybės įrodymas</text>
  </g>

  <!-- Right side: title -->
  <g transform="translate(580,150)">
    <text x="0" y="0" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="3">BDAR 39 STRAIPSNIS · MOKYMAI</text>
    <text x="0" y="54" fill="#fff" font-family="Syne, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-1">Darbuotojų</text>
    <text x="0" y="106" fill="#fff" font-family="Syne, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-1">BDAR mokymai</text>
    <text x="0" y="146" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="17">Ką privalo žinoti kiekvienas darbuotojas</text>

    <!-- Highlight stat -->
    <g transform="translate(0,190)">
      <rect x="0" y="0" width="470" height="78" rx="8" fill="rgba(34,85,224,0.1)" stroke="rgba(34,85,224,0.4)" stroke-width="1.5"/>
      <text x="22" y="30" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2">ATSAKYMO TERMINAS UŽKLAUSAI</text>
      <text x="22" y="62" fill="#fff" font-family="Syne, system-ui, sans-serif" font-size="24" font-weight="800">1 mėnuo · BDAR 12 str.</text>
    </g>
  </g>

  <!-- VERIVA wordmark bottom -->
  <g transform="translate(580,500)">
    <text x="0" y="0" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="3">VERIVA · BDAR ATITIKTIS · TEISĖ + IT VIENOJE KOMANDOJE</text>
  </g>
</svg>
