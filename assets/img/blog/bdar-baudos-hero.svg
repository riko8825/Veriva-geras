<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">BDAR baudos Lietuvoje 2026 — dydžiai ir sankcijos</title>
  <desc id="hero-desc">Iliustracija vaizduoja BDAR baudų pakopas Lietuvoje: nuo 10 iki 20 milijonų eurų, su VDAI patikrinimo dokumentu ir Vinted 2,38 mln. EUR precedentu.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#2255e0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2255e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.75" r="0.5">
      <stop offset="0%" stop-color="#c8962a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c8962a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a47cc"/>
      <stop offset="100%" stop-color="#2255e0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid pattern (subtle) -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Document mockup left side -->
  <g transform="translate(110,140)">
    <rect x="0" y="0" width="380" height="480" rx="10" fill="#0c1a2e" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <!-- Doc header -->
    <rect x="32" y="36" width="120" height="8" rx="2" fill="#2255e0"/>
    <rect x="32" y="56" width="200" height="6" rx="2" fill="rgba(255,255,255,0.4)"/>
    <!-- Stamp / seal -->
    <circle cx="320" cy="68" r="32" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="3 3"/>
    <text x="320" y="65" text-anchor="middle" fill="#dc2626" font-family="system-ui, sans-serif" font-size="9" font-weight="800">VDAI</text>
    <text x="320" y="78" text-anchor="middle" fill="#dc2626" font-family="system-ui, sans-serif" font-size="7" font-weight="600">2024</text>
    <!-- Body lines -->
    <g fill="rgba(255,255,255,0.18)">
      <rect x="32" y="120" width="316" height="6" rx="2"/>
      <rect x="32" y="138" width="280" height="6" rx="2"/>
      <rect x="32" y="156" width="300" height="6" rx="2"/>
      <rect x="32" y="174" width="260" height="6" rx="2"/>
    </g>
    <g fill="rgba(255,255,255,0.12)">
      <rect x="32" y="210" width="316" height="6" rx="2"/>
      <rect x="32" y="228" width="296" height="6" rx="2"/>
      <rect x="32" y="246" width="316" height="6" rx="2"/>
      <rect x="32" y="264" width="240" height="6" rx="2"/>
      <rect x="32" y="282" width="304" height="6" rx="2"/>
    </g>
    <!-- Highlight: bauda -->
    <rect x="32" y="320" width="316" height="44" rx="6" fill="rgba(220,38,38,0.12)" stroke="rgba(220,38,38,0.4)" stroke-width="1"/>
    <text x="48" y="338" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11" font-weight="700">BAUDA SKIRTA</text>
    <text x="48" y="357" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="800">€2 385 276</text>
    <!-- Sign line -->
    <rect x="32" y="404" width="120" height="3" fill="rgba(255,255,255,0.3)"/>
    <text x="32" y="424" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="10">VDAI · 2024-07-02</text>
  </g>

  <!-- Right side: scale of fines -->
  <g transform="translate(620,120)">
    <text x="0" y="0" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="3">BDAR · 83 STR.</text>
    <text x="0" y="50" fill="#fff" font-family="system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="-1">Baudų pakopos</text>
    <text x="0" y="84" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="16">Lietuva · 2026 m.</text>

    <!-- Tier 1 -->
    <g transform="translate(0,140)">
      <rect x="0" y="0" width="430" height="74" rx="8" fill="rgba(34,85,224,0.1)" stroke="rgba(34,85,224,0.4)" stroke-width="1.5"/>
      <text x="22" y="28" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2">PIRMOJI PAKOPA</text>
      <text x="22" y="58" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">€10 mln. arba 2% apyvartos</text>
    </g>

    <!-- Tier 2 -->
    <g transform="translate(0,234)">
      <rect x="0" y="0" width="430" height="74" rx="8" fill="rgba(220,38,38,0.12)" stroke="rgba(220,38,38,0.5)" stroke-width="1.5"/>
      <text x="22" y="28" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2">ANTROJI PAKOPA</text>
      <text x="22" y="58" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">€20 mln. arba 4% apyvartos</text>
    </g>

    <!-- Stat -->
    <g transform="translate(0,344)">
      <text x="0" y="0" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Didžiausia LT bauda iki šiol:</text>
      <text x="0" y="30" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="32" font-weight="800">Vinted UAB · €2,38 mln.</text>
    </g>
  </g>

  <!-- VERIVA wordmark bottom -->
  <g transform="translate(110,580)">
    <text x="0" y="0" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="3">VERIVA · BDAR ATITIKTIS · KIBERNETINIS SAUGUMAS</text>
  </g>
</svg>
