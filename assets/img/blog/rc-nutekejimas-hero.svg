<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Registrų centro 2026 m. duomenų nutekėjimas — 600 000+ įrašų, 111 000 EUR žala</title>
  <desc id="hero-desc">Iliustracija vaizduoja Registrų centro duomenų nutekėjimo schemą: duomenys iš RC Nekilnojamojo turto registro per Migracijos departamento paskyras buvo nutekinti į užsienio valstybę, padarant 111 000 EUR žalą.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.75" r="0.5">
      <stop offset="0%" stop-color="#c8962a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c8962a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a47cc"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid pattern (subtle) -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Database mockup left side -->
  <g transform="translate(110,140)">
    <rect x="0" y="0" width="380" height="480" rx="10" fill="url(#dbGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

    <!-- DB header -->
    <rect x="0" y="0" width="380" height="56" rx="10" fill="#0c1a2e"/>
    <rect x="0" y="44" width="380" height="12" fill="#0c1a2e"/>
    <text x="22" y="34" fill="rgba(255,255,255,0.85)" font-family="Syne, system-ui, sans-serif" font-size="12" font-weight="800" letter-spacing="2">REGISTRŲ CENTRAS</text>
    <text x="358" y="34" text-anchor="end" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="600">.LT</text>

    <!-- DB stack cylinders -->
    <g transform="translate(110,90)">
      <!-- Top -->
      <ellipse cx="80" cy="14" rx="80" ry="14" fill="#1a47cc" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <path d="M 0 14 L 0 50 Q 0 64 80 64 Q 160 64 160 50 L 160 14" fill="#1a47cc" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
      <ellipse cx="80" cy="50" rx="80" ry="14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
      <!-- Mid -->
      <path d="M 0 50 L 0 86 Q 0 100 80 100 Q 160 100 160 86 L 160 50" fill="#1a47cc" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
      <ellipse cx="80" cy="86" rx="80" ry="14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
      <!-- Bottom -->
      <path d="M 0 86 L 0 122 Q 0 136 80 136 Q 160 136 160 122 L 160 86" fill="#1a47cc" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
      <ellipse cx="80" cy="122" rx="80" ry="14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    </g>

    <!-- Broken lock icon overlay -->
    <g transform="translate(295,100)">
      <circle cx="34" cy="34" r="32" fill="rgba(220,38,38,0.18)" stroke="#dc2626" stroke-width="2.5"/>
      <!-- Lock body -->
      <rect x="22" y="32" width="24" height="20" rx="2" fill="#dc2626"/>
      <!-- Broken shackle (left half) -->
      <path d="M 26 32 L 26 24 Q 26 18 30 16" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
      <!-- Broken shackle (right half — offset) -->
      <path d="M 44 32 L 44 22 Q 44 14 40 12" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
      <!-- Crack zigzag -->
      <path d="M 32 36 L 36 40 L 33 44 L 37 48" fill="none" stroke="#07111f" stroke-width="1.5"/>
    </g>

    <!-- Data flow records (rows leaking out) -->
    <g fill="rgba(255,255,255,0.18)">
      <rect x="32" y="260" width="316" height="6" rx="2"/>
      <rect x="32" y="276" width="280" height="6" rx="2"/>
      <rect x="32" y="292" width="300" height="6" rx="2"/>
      <rect x="32" y="308" width="260" height="6" rx="2"/>
    </g>

    <!-- Highlight: nutekėjimo dydis -->
    <rect x="32" y="340" width="316" height="56" rx="6" fill="rgba(220,38,38,0.15)" stroke="rgba(220,38,38,0.5)" stroke-width="1.5"/>
    <text x="48" y="362" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2">NUTEKĖJO ĮRAŠŲ</text>
    <text x="48" y="386" fill="#fff" font-family="Syne, system-ui, sans-serif" font-size="22" font-weight="800">600 000+ asmenų</text>

    <!-- Source line -->
    <rect x="32" y="420" width="120" height="3" fill="rgba(255,255,255,0.3)"/>
    <text x="32" y="440" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="10">NTR · Nekilnojamojo turto registras</text>
  </g>

  <!-- Right side: incident summary -->
  <g transform="translate(620,120)">
    <text x="0" y="0" fill="#e8b84b" font-family="system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="3">VDAI TYRIMAS · 2026</text>
    <text x="0" y="50" fill="#fff" font-family="Syne, system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="-1">RC nutekėjimas</text>
    <text x="0" y="84" fill="rgba(255,255,255,0.55)" font-family="system-ui, sans-serif" font-size="16">Per Migracijos departamento paskyras · Užsienio valstybė</text>

    <!-- Tier 1 — žala -->
    <g transform="translate(0,140)">
      <rect x="0" y="0" width="430" height="74" rx="8" fill="rgba(220,38,38,0.12)" stroke="rgba(220,38,38,0.5)" stroke-width="1.5"/>
      <text x="22" y="28" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2">PADARYTA TURTINĖ ŽALA</text>
      <text x="22" y="58" fill="#fff" font-family="Syne, system-ui, sans-serif" font-size="22" font-weight="800">111 000 EUR · sukčiavimas</text>
    </g>

    <!-- Tier 2 — atakos vektorius -->
    <g transform="translate(0,234)">
      <rect x="0" y="0" width="430" height="74" rx="8" fill="rgba(34,85,224,0.1)" stroke="rgba(34,85,224,0.4)" stroke-width="1.5"/>
      <text x="22" y="28" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2">ATAKOS VEKTORIUS</text>
      <text x="22" y="58" fill="#fff" font-family="Syne, system-ui, sans-serif" font-size="22" font-weight="800">MD paskyrų piktnaudžiavimas</text>
    </g>

    <!-- Stat -->
    <g transform="translate(0,344)">
      <text x="0" y="0" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Tyrimo pradžia · oficialus pranešimas:</text>
      <text x="0" y="30" fill="#e8b84b" font-family="Syne, system-ui, sans-serif" font-size="32" font-weight="800">2026 m. gegužė · VDAI</text>
    </g>
  </g>

  <!-- VERIVA wordmark bottom -->
  <g transform="translate(110,580)">
    <text x="0" y="0" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="3">VERIVA · BDAR ATITIKTIS · KIBERNETINIS SAUGUMAS</text>
  </g>
</svg>
