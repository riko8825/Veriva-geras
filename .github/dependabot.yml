# Dependabot configuration — Veriva
# Docs: https://docs.github.com/en/code-security/dependabot
# Adaptuota iš Empirra projekto (s42 B6 hardening pattern). Auto-PR'ai security + minor updates.

version: 2
updates:
  # NPM dependencies (production + dev)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Vilnius"
    open-pull-requests-limit: 5
    # Group minor + patch updates per package — mažiau noise
    groups:
      production-deps:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - "minor"
          - "patch"
      dev-deps:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
    # Major updates — atskira PR per package, manual review
    ignore:
      # Resend major bumps — atskira sesija (Empirra s42 audit decision pattern)
      - dependency-name: "resend"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Vilnius"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: "scope"
